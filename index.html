<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая вкладка</title>
    <style>
        :root {
            --bg: #f6f6f6;
            --text: #1e1e2f;
            --placeholder: #9e9eae;
            --scrollbar-track: rgba(0,0,0,0.05);
            --scrollbar-thumb: rgba(0,0,0,0.2);
            --status-bg: rgba(246,246,246,0.9);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #333333;
                --text: #e8e8e8;
                --placeholder: #9e9e9e;
                --scrollbar-track: rgba(255,255,255,0.1);
                --scrollbar-thumb: rgba(255,255,255,0.25);
                --status-bg: rgba(51,51,51,0.9);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .notebook {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        .notes-editor {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.05rem;
            line-height: 1.6;
            font-family: 'Segoe UI', monospace;
            resize: none;
            color: inherit;
            padding: 24px;
            overflow-y: auto;
        }
        .notes-editor::-webkit-scrollbar { width: 8px; }
        .notes-editor::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 10px; }
        .notes-editor::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        .notes-editor::placeholder { color: var(--placeholder); opacity: 0.7; }
        .status {
            position: fixed;
            bottom: 20px;
            right: 24px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text);
            background: var(--status-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        .status.show { opacity: 1; }
        @media (max-width: 768px) {
            .notes-editor { font-size: 1rem; padding: 20px; }
        }
        @media (max-width: 480px) {
            .notes-editor { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="notebook">
        <textarea class="notes-editor" id="editor" placeholder="Начните писать...&#10;Всё сохраняется автоматически." spellcheck="true"></textarea>
    </div>
    <div class="status" id="status">Сохранено</div>
    <script src="./notes.js"></script>
</body>
</html>
